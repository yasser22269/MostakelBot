<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bot Control</title>
    <link rel="stylesheet" href="styles.css">
<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
</head>
<body>
    <div class="tab-container">
        <div class="tab-header">
            <button class="tab-link active" data-tab="bot-control">Bot Control</button>
            <button class="tab-link" data-tab="file-editor">File Editor</button>
        </div>
        <div id="bot-control" class="tab-content active">
            <h1>Bot Control</h1>
            <div id="controls">
                <div class="input-container">
                    <div class="input-group">
                        <label for="threads">Number of Threads:</label>
                        <input type="number" id="threads" value="5">
                    </div>
                    <div class="input-group">
                        <label for="tickets">Number of Tickets:</label>
                        <input type="number" id="tickets" value="1">
                    </div>
                    <div class="input-group">
                        <label for="eventUrl">Event URL:</label>
                        <input type="text" id="eventUrl" value="https://webook.com/ar/events/saudi-pro-league-week-1-damac-vs-al-hazem-spl-685149">
                    </div>
                    <div class="input-group">
                        <label for="blockName">Block Name:</label>
                        <input type="text" id="blockName" value="">
                    </div>
                    <div class="input-group">
                        <label for="botVersion">Bot Version:</label>
                        <select id="botVersion">
                            <option value="auto" selected>Auto</option>
                            <option value="v1">V1</option>
                            <option value="v2">V2</option>
                        </select>
                    </div>
                </div>
                <div class="button-container">
                    <button id="start-btn">Start Bot</button>
                    <button id="stop-btn" disabled>Stop Bot</button>
                    <button id="prepare-access-token-btn">Prepare Access Token</button>
                    <button id="fetch-hold-token-btn">Fetch Hold-Tokens</button>
                    <button id="prepare-booking-info-btn">Prepare Booking Info</button>
                </div>
            </div>
            <div id="log-container">
                <h2>Logs</h2>
                <div id="logs"></div>
            </div>
        </div>
        <div id="file-editor" class="tab-content">
            <h1>File Editor</h1>
            <div class="editor-controls">
                <select id="file-selector"></select>
                <button id="save-file-btn">Save File</button>
            </div>
            <textarea id="file-content"></textarea>
        </div>
    </div>

    <div id="status-bar">
        <div id="held-seats">Held Seats: 0</div>
        <div id="processed-accounts">Processed Accounts: 0</div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
